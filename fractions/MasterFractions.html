<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Visual Fractions Lesson</title>

<body>
    <header>
        <h1>Mastering Fractions</h1>
        <p>A simple guide to understanding parts of a whole.</p>
    </header>

    <main class="container">
        
        <section class="card">
            <h2>What is a Fraction?</h2>
            <p>A fraction represents a part of a whole number.</p>
            <div class="math-display">
                <math display="block">
                    <mfrac>
                        <mi>Numerator</mi>
                        <mi>Denominator</mi>
                    </mfrac>
                </math>           </div>
        </section>

        
        <section class="card">
            <h2>Visualizing ¾</h2>
            <p>Three out of four equal parts are shaded.</p>
            <img src="https://www.meaningfulmathco.com/wp-content/uploads/2025/07/Fraction-12-768x432.png" width=50%>
                <div class="pie-chart"></div>
            </div>
        </section>
        <h2>Here is an awesome video to help you understand!</h2>
    </main>
</body>
</html>
